<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Font Family</title>
  <style>

    h1 {
      font-family: 'Architects Daughter', cursive; 
    }
    #Archivo-Black {
      font-family: Archivo Black;
    }

    #arial {
      font-family: Arial, sans-serif;
    }

    #Roboto-Mono {
      font-family: Roboto Mono;
    }

    #sans-serif {
      font-family: sans-serif;
    }

    #Cedarville-Cursive {
      font-family: Cedarville Cursive;
    }

    #monospace {
      font-family: monospace;
    }

    #Fjalla-One {
      font-family: Fjalla One;
    }
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Fjalla+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Fjalla+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Fjalla+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Fjalla+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cedarville+Cursive&family=Fjalla+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>

<body>
  <h1>Font Family</h1>
  <p id="Archivo-Black">Archivo Black</p>
  <p id="arial">Arial</p>
  <p id="Roboto-Mono">Roboto Mono</p>
  <p id="sans-serif">Sans Serif</p>
  <p id="Cedarville-Cursive">Cedarville Cursive</p>
  <p id="monospace">Monospace</p>
  <p id="Fjalla-One">Fjalla One</p>

</body>

</html>
