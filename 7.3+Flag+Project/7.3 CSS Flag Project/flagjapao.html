<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Japão</title>
  
</head>

<style>

  body {
    background-color: black;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .flag {
    background-color: white;
    width: 900px;
    height: 600px;
    position: relative;
  }

  .flag {
  margin: 0 auto;
}

  .circle {
    background-color:#BC002D;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    position: absolute;
    top: 150px;
    left: 300px;
    }



</style>
<body>

  <div class="flag">
    <div class="circle"></div>
  </div>
  
</body>
</html>
